name: CI

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  python-checks:
    name: Python checks (${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.13"]

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
          cache-dependency-glob: |
            pyproject.toml
            uv.lock
          python-version: ${{ matrix.python-version }}

      - name: Sync dependencies
        run: uv sync --locked

      - name: Run prek hooks
        run: uv run prek run --all-files

      - name: Run lightweight pytest suite
        run: uv run pytest -m "not e2e" --cov --cov-report=term

  build-artifacts:
    name: Build frontend and package
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: streamlit_bubble_chat/frontend/package-lock.json

      - name: Build frontend assets
        run: |
          npm --prefix streamlit_bubble_chat/frontend ci
          npm --prefix streamlit_bubble_chat/frontend run build

      - name: Set up uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
          cache-dependency-glob: |
            pyproject.toml
            uv.lock
          python-version: "3.13"

      - name: Build Python distributions
        run: uv build

      - name: Upload dist artifacts
        uses: actions/upload-artifact@v4
        with:
          name: python-dist
          path: dist/*

  e2e-tests:
    name: E2E tests (Playwright, py${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.13"]

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: streamlit_bubble_chat/frontend/package-lock.json

      - name: Build frontend assets
        run: |
          npm --prefix streamlit_bubble_chat/frontend ci
          npm --prefix streamlit_bubble_chat/frontend run build

      - name: Set up uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
          cache-dependency-glob: |
            pyproject.toml
            uv.lock
          python-version: ${{ matrix.python-version }}

      - name: Sync dependencies
        run: uv sync --locked

      - name: Install Playwright browsers
        run: uv run playwright install --with-deps chromium

      - name: Run E2E tests
        run: uv run pytest -m "e2e"
